name: JavaScript Vulnerability Scan

on:
  push:
    branches: [ main ]

jobs:
  dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
        
